<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="log-in_dashboard.css">
<title>ASAC System Login</title>

</head>
<body>

<div class="wrapper">

    <!-- LEFT SIDE -->
    <div class="left-side">
        <img src="ASAC Logo 3 (1).png" alt="ASAC Logo" class="logo">
        <img src="ASAC Logo 2 (1).png" alt="ASAC Text Logo" class="text-logo">
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-side">

        <div class="header">
            <h1>ASAC System</h1>
            <p>Accounting System of Agriculture Cooperatives</p>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="form-title">
                Sign In to Your Account
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter your Password"
                    required
                >
            </div>

            <button type="submit">LOGIN</button>
        </form>

    </div>
</div>

<script>
function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    console.log("Login submitted", { email, password });
    alert("Login submitted! Check console.");
}
</script>

</body>
</html>
